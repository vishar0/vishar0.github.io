title: Viswanath (Vish) Sivakumar
author: Viswanath Sivakumar
email: viswanathgs@gmail.com
baseurl: ""
url: "https://vishar0.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  thoughts:
    output: true
    permalink: /thoughts/:slug/
    sort_by: date

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "thoughts"
    values:
      layout: "thought"

# Permalink settings
permalink: /blog/:title/

# Social settings
twitter:
  username: viswanathgs
