<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <title>{{ page.title }} - {{ site.title }}</title>

  {% seo %}

  <!-- MathJax for math rendering -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
</head>
<body>
  <div class="header">
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    <div class="nav">
      <a href="{{ '/blog/' | relative_url }}">blog</a>
      <a href="{{ '/thoughts/' | relative_url }}" class="active">thoughts</a>
    </div>
  </div>

  <div class="content thought-page">
    <div class="thought-back">
      <a href="{{ '/thoughts/' | relative_url }}#{{ page.slug }}">← thoughts</a>
    </div>
    <h2 class="thought-page-title">{{ page.title }}</h2>
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</div>

    {{ content }}
  </div>

</body>
</html>
